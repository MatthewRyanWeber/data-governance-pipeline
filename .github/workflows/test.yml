name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    name: Unit tests (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          pip install -e ".[dev]" pytest-cov
          pip install pyarrow duckdb paramiko boto3

      - name: Lint with pyflakes
        run: python -m pyflakes pipeline/ tests/

      - name: Run unit tests with coverage
        # Integration and benchmark tests run in dedicated jobs; exclude them here.
        run: >
          python -m pytest tests/ -q --tb=short
          --ignore=tests/test_integration_db.py
          --ignore=tests/test_benchmarks.py
          --ignore=tests/test_api_load.py
          -m "not slow"
          --cov=pipeline --cov-report=term-missing

      - name: Type check with mypy
        run: python -m mypy pipeline/ --ignore-missing-imports

  integration:
    name: Live DB integration (testcontainers)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install -e ".[dev]"
          pip install "testcontainers[postgres,mysql,mongodb]" pymysql

      - name: Run live DB integration tests
        # Docker is available on GitHub's Linux runners; testcontainers spins
        # up real Postgres/MySQL/Mongo. Skips cleanly if Docker is ever absent.
        run: python -m pytest tests/test_integration_db.py -v -m integration

  benchmarks:
    name: Performance benchmarks
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install -e ".[dev]"
          pip install pyarrow duckdb paramiko boto3

      - name: Run benchmarks
        run: >
          python -m pytest tests/test_benchmarks.py tests/test_api_load.py
          -v -m slow -s
