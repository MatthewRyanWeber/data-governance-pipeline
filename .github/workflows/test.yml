name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    name: Unit tests (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          pip install -e ".[dev]" pytest-cov
          pip install pyarrow duckdb paramiko boto3

      - name: Lint with pyflakes
        run: python -m pyflakes pipeline/ tests/

      - name: Lint for unreachable code
        # pyflakes does not catch code after return/raise; a mechanical
        # edit once left a GDPR audit call dangling after a return.
        run: python scripts/lint_unreachable.py pipeline

      - name: Run unit tests with coverage
        # Integration and benchmark tests run in dedicated jobs; exclude them here.
        run: >
          python -m pytest tests/ -q --tb=short
          --ignore=tests/test_integration_db.py
          --ignore=tests/integration
          --ignore=tests/test_benchmarks.py
          --ignore=tests/test_api_load.py
          -m "not slow"
          --cov=pipeline --cov-report=term-missing

      - name: Type check with mypy
        run: python -m mypy pipeline/ --ignore-missing-imports

  minimal-deps:
    # Runs the loader tests with optional loader SDKs deliberately absent, so
    # the deps-absent code path (mocked via _ensure_mock_module) is exercised.
    # This catches the "from optional.submodule import X" class of bug that
    # passes on a dev box only because the dep happens to be installed.
    name: Loader tests (optional deps absent)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install deps (test infra present; loader SDKs hidden by the plugin)
        run: |
          pip install -e ".[dev]"
          pip install pyarrow duckdb paramiko boto3
      - name: Run loader tests with optional deps blocked
        # The block_optional_deps plugin makes the optional loader SDKs
        # un-importable at runtime, so the deps-absent path runs even though
        # the test-infra deps (hypothesis, etc.) remain available.
        run: >
          python -m pytest tests/test_loaders -q --tb=short
          -p scripts.block_optional_deps -m "not slow"

  integration:
    name: Real engines (${{ matrix.group.name }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        group:
          - name: core-db
            paths: tests/test_integration_db.py tests/integration/test_embedded_engines.py
          - name: sql-engines
            paths: tests/integration/test_container_sql_engines.py
          - name: streams-vector
            paths: tests/integration/test_container_streams_files.py tests/integration/test_container_vector_engines.py tests/integration/test_partitioned_ledger_object_store.py
          - name: emulators
            paths: tests/integration/test_emulator_engines.py
          - name: heavy
            paths: tests/integration/test_container_heavy_engines.py
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install MS ODBC Driver 18
        if: matrix.group.name == 'sql-engines'
        run: |
          curl -sSL https://packages.microsoft.com/keys/microsoft.asc | sudo tee /etc/apt/trusted.gpg.d/microsoft.asc
          curl -sSL https://packages.microsoft.com/config/ubuntu/22.04/prod.list | sudo tee /etc/apt/sources.list.d/mssql-release.list
          sudo apt-get update
          sudo ACCEPT_EULA=Y apt-get install -y msodbcsql18 unixodbc-dev

      - name: Install dependencies
        run: |
          pip install -e ".[dev,integration]"
          pip install "testcontainers[postgres,mysql,mongodb]" pymysql

      - name: Run real-engine integration tests
        # Docker is available on GitHub's Linux runners; testcontainers
        # spins up real engines.  Every loader in the core tier is driven
        # against its actual engine here.
        run: python -m pytest ${{ matrix.group.paths }} -v -m integration

  benchmarks:
    name: Performance benchmarks
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install -e ".[dev]"
          pip install pyarrow duckdb paramiko boto3

      - name: Run benchmarks
        run: >
          python -m pytest tests/test_benchmarks.py tests/test_api_load.py
          -v -m slow -s
