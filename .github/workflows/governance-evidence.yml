name: Governance evidence

# Accrues "production miles" — the evidence a governance system needs but a
# single demo run cannot give:
#   • canary       — a fixed synthetic frame through the real governance core,
#                    appending a dated pass/fail track record every run.
#   • real-dataset — a live public-domain US government dataset (USGS quakes)
#                    governed end to end, refreshing committed artifacts.
# Both commit their evidence back to the repo with [skip ci] so the bot commit
# does not retrigger CI. A broken governance core fails red (a real regression);
# an unreachable feed is a loud skip, not a failure.

on:
  workflow_dispatch:
  schedule:
    - cron: "0 6 * * *"   # daily, 06:00 UTC

permissions:
  contents: write

concurrency:
  group: governance-evidence
  cancel-in-progress: false

jobs:
  canary:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install
        run: pip install -e ".[dev]"

      - name: Run governance canary (5 runs)
        run: |
          set +e
          python scripts/canary_run.py --runs 5
          echo "CANARY_EXIT=$?" >> "$GITHUB_ENV"

      - name: Commit track record
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add examples/canary/track_record.jsonl
          if git diff --cached --quiet; then
            echo "No new canary records to commit."
          else
            git commit -m "chore(canary): append governance track record [skip ci]"
            git pull --rebase --autostash origin main
            git push
          fi

      - name: Fail if the canary failed (a real governance regression)
        run: test "$CANARY_EXIT" = "0"

  real-dataset:
    runs-on: ubuntu-latest
    needs: canary           # serialize the two commit-back jobs
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install
        run: pip install -e ".[dev]" pyarrow

      - name: Govern a real government dataset
        run: |
          set +e
          python scripts/real_dataset_run.py
          echo "REAL_EXIT=$?" >> "$GITHUB_ENV"

      - name: Commit refreshed artifacts
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add examples/data_gov_run/artifacts \
                  examples/data_gov_run/provenance.json \
                  examples/data_gov_run/usgs_all_day.csv
          if git diff --cached --quiet; then
            echo "No artifact changes to commit."
          else
            git commit -m "chore(real-run): refresh real-dataset artifacts [skip ci]"
            git pull --rebase --autostash origin main
            git push
          fi

      # Exit 1 = governance failure (alert). Exit 2 = feed unreachable (loud
      # skip, not a regression). Exit 0 = success.
      - name: Fail only on a real governance failure
        run: test "$REAL_EXIT" != "1"
