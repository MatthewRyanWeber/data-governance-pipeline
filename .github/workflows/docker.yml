name: Docker

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t data-governance-pipeline .

      - name: Run tests in Docker
        run: docker run --rm data-governance-pipeline python -m pytest tests/ -q --tb=short
