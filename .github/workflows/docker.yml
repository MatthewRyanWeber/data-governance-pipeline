name: Docker

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Run tests in Docker
        run: docker build --target test -t data-governance-pipeline-test .

      - name: Build production image
        run: docker build -t data-governance-pipeline .
